name: Deploy Frontend Fix

on:
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Sync fixed files to drsaeedMoghadamFront
        env:
          FRONTEND_SYNC_TOKEN: ${{ secrets.FRONTEND_SYNC_TOKEN }}
        run: |
          if [ -z "$FRONTEND_SYNC_TOKEN" ]; then
            echo "FRONTEND_SYNC_TOKEN secret is not configured."
            exit 1
          fi

          git clone "https://x-access-token:${FRONTEND_SYNC_TOKEN}@github.com/amirhosseinmakineh/drsaeedMoghadamFront.git" target
          cp frontend/src/app/pages/consultant-dashboard/consultant-dashboard.component.ts \
            target/src/app/pages/consultant-dashboard/consultant-dashboard.component.ts
          cp frontend/src/app/core/consultant/consultant-dashboard.service.ts \
            target/src/app/core/consultant/consultant-dashboard.service.ts

          cd target
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "No changes to deploy."
            exit 0
          fi
          git commit -m "Fix realtime lead timer and report flow on pickup from notification"
          git push origin main
